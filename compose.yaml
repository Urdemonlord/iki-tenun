services:
  app:
    build: .
    ports:
      - "127.0.0.1:3301:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/dev.db
      - DATABASE_FILE=/data/dev.db
      - ORIGIN=https://ikitenun.meowlabs.id
      # Midtrans — isi dengan key dari dashboard Midtrans
      - MIDTRANS_SERVER_KEY=
      - MIDTRANS_IS_PRODUCTION=false
      # RajaOngkir — isi dengan API key dari dashboard RajaOngkir
      - RAJAONGKIR_API_KEY=
    volumes:
      - ikitenun_data:/data
    restart: unless-stopped

volumes:
  ikitenun_data: