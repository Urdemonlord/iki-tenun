services:
  app:
    build: .
    ports:
      - "127.0.0.1:3301:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/dev.db
      - DATABASE_FILE=/data/dev.db
      - ORIGIN=https://ikitenun.meowlabs.id
      # Midtrans — isi dengan key dari dashboard Midtrans
      # Sandbox: https://dashboard.sandbox.midtrans.com/settings/config
      # Production: https://dashboard.midtrans.com/settings/config
      - MIDTRANS_SERVER_KEY=
      - MIDTRANS_IS_PRODUCTION=false
    volumes:
      - ikitenun_data:/data
    restart: unless-stopped

volumes:
  ikitenun_data: